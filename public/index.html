<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Atlas Solidity Risk API</title>
  <style>
    :root { font-family: Inter, system-ui, sans-serif; color-scheme: dark; }
    body { margin: 0; background: #0b0d10; color: #f4f5f7; }
    main { max-width: 980px; margin: 0 auto; padding: 56px 20px; }
    .eyebrow { color: #8ca0ff; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    h1 { font-size: clamp(42px, 7vw, 78px); line-height: .95; margin: 18px 0; max-width: 900px; }
    p { color: #b6bcc8; font-size: 18px; line-height: 1.6; }
    .card { background: #14181e; border: 1px solid #272d36; border-radius: 20px; padding: 20px; margin-top: 28px; }
    textarea { width: 100%; min-height: 300px; box-sizing: border-box; resize: vertical; background: #090b0e; color: #e9edf4; border: 1px solid #343b46; border-radius: 12px; padding: 16px; font: 14px/1.5 ui-monospace, monospace; }
    button { margin-top: 14px; border: 0; border-radius: 999px; padding: 13px 20px; background: #f2f4f8; color: #0b0d10; font-weight: 800; cursor: pointer; }
    pre { white-space: pre-wrap; word-break: break-word; background: #090b0e; border-radius: 12px; padding: 16px; min-height: 80px; }
    code { color: #aebdff; }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">x402-paid API • Base Sepolia</div>
    <h1>Fast Solidity risk signals for agents and builders.</h1>
    <p>
      The paid endpoint charges per request through x402. This page exposes a limited free preview;
      agents can call <code>POST /api/analyze</code> for the full scan.
    </p>

    <section class="card">
      <textarea id="source">pragma solidity ^0.8.24;
contract Example {
  address owner;
  function run(address target, bytes calldata data) external {
    require(tx.origin == owner);
    (bool ok,) = target.call(data);
    require(ok);
  }
}</textarea>
      <button id="run">Run free preview</button>
      <pre id="output">Ready.</pre>
    </section>
  </main>
  <script>
    document.querySelector("#run").addEventListener("click", async () => {
      const output = document.querySelector("#output");
      output.textContent = "Scanning…";
      try {
        const response = await fetch("/api/demo", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ source: document.querySelector("#source").value })
        });
        output.textContent = JSON.stringify(await response.json(), null, 2);
      } catch (error) {
        output.textContent = String(error);
      }
    });
  </script>
</body>
</html>
